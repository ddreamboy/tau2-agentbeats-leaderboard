name = "green"
env = { LOG_LEVEL = "INFO", OPENAI_API_KEY = "${LLM_API_KEY}", OPENAI_BASE_URL = "https://routerai.ru/api/v1", GEMINI_API_KEY = "none", DEEPSEEK_API_KEY = "none" }

[[participants]]
image = "ghcr.io/ddreamboy/tau2-purple-agent:latest"
