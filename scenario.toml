env = { LOG_LEVEL = "INFO", LLM_API_KEY = "${LLM_API_KEY}", LLM_API_URL = "https://routerai.ru/api/v1", LLM_API_BASE_MODEL = "google/gemini-2.5-flash-lite" }

[config]
domain = "airline"
user_llm = "openai/google/gemini-2.5-flash-lite"
